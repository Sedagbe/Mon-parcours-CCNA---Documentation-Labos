<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCNA Journey — Ma Documentation Réseau</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --text: #e8ecf4;
      --muted: #6b7694;
      --green: #00e5a0;
      --tag-bg: #1e2540;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 212, 255, 0.07) 0%, transparent 70%);
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 15, 20, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #0080ff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .logo-text span { color: var(--accent); }

    /* ─── SEARCH ─── */
    .search-wrap {
      flex: 1;
      max-width: 520px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 16px 10px 42px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }

    #searchInput::placeholder { color: var(--muted); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-add {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ─── LAYOUT ─── */
    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ─── HERO BANNER ─── */
    .hero {
      background: linear-gradient(135deg, #0f1625 0%, #131c35 50%, #0d1520 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 48px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero::after {
      content: '//';
      position: absolute;
      right: 48px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Syne', sans-serif;
      font-size: 8rem;
      font-weight: 800;
      color: rgba(0, 212, 255, 0.04);
      line-height: 1;
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.25);
      color: var(--accent);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 12px;
      letter-spacing: -0.03em;
    }

    .hero p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 480px;
      line-height: 1.6;
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      margin-top: 28px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ─── FILTERS / TABS ─── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    /* ─── GRID ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(0,212,255,0.3);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,212,255,0.08);
    }

    /* Thumbnail */
    .thumb {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--surface2);
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .card:hover .thumb img { transform: scale(1.04); }

    .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    /* Type badge overlay */
    .type-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .type-badge.video {
      background: rgba(255, 0, 0, 0.85);
      color: #fff;
    }

    .type-badge.packet {
      background: rgba(0, 212, 255, 0.9);
      color: #000;
    }

    .type-badge.both {
      background: rgba(255, 107, 53, 0.9);
      color: #fff;
    }

    /* Duration */
    .duration {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* Card body */
    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 8px;
    }

    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .action-btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.18s;
      text-decoration: none;
    }

    .action-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }

    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .action-btn.primary:hover { opacity: 0.85; }

    /* ─── NO RESULTS ─── */
    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .no-results .icon { font-size: 3rem; margin-bottom: 16px; }
    .no-results h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 8px; color: var(--text); }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      padding: 28px;
      transform: translateY(20px);
      transition: transform 0.25s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent); }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-group select option { background: var(--surface); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-actions button {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-cancel {
      background: var(--surface2);
      color: var(--muted);
    }

    .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

    .btn-save {
      background: var(--accent);
      color: #000;
      border-color: var(--accent) !important;
    }

    .btn-save:hover { opacity: 0.85; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      header { padding: 0 16px; }
      .logo-text { display: none; }
      .page { padding: 20px 16px; }
      .hero { padding: 24px; }
      .hero::after { display: none; }
      .hero-stats { gap: 20px; flex-wrap: wrap; }
      .grid { grid-template-columns: 1fr 1fr; gap: 14px; }
      .btn-add span { display: none; }
      .form-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeUp 0.4s ease both; }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.3s; }

    /* Count badge */
    #resultCount {
      font-size: 0.82rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">🌐</div>
    <span class="logo-text">CCNA<span>Journey</span></span>
  </a>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Rechercher VLAN, OSPF, NAT, STP..."/>
  </div>

  <div class="header-actions">
    <button class="btn-add" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      <span>Ajouter</span>
    </button>
  </div>
</header>

<!-- ─── PAGE ─── -->
<main class="page">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      En cours · Cisco CCNA 200-301
    </div>
    <h1>Ma Documentation<br>Réseau CCNA</h1>
    <p>Tous mes labs Packet Tracer, explications vidéo et notes de révision au même endroit. Clique sur une carte pour accéder au fichier ou à la vidéo.</p>
    <div class="hero-stats">
      <div class="stat">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">Labs</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="videoCount">0</span>
        <span class="stat-label">Vidéos</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="pktCount">0</span>
        <span class="stat-label">Fichiers .pkt</span>
      </div>
    </div>
  </div>

  <!-- Section -->
  <div class="section-header">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <span class="section-title">Tous mes Labs</span>
      <span id="resultCount"></span>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tout</button>
      <button class="filter-btn" onclick="setFilter('video', this)">📹 Vidéo</button>
      <button class="filter-btn" onclick="setFilter('packet', this)">🗂️ Packet Tracer</button>
      <button class="filter-btn" onclick="setFilter('both', this)">⚡ Les deux</button>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid" id="grid"></div>

</main>

<!-- ─── MODAL AJOUT ─── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h2>➕ Ajouter un Lab</h2>

    <div class="form-group">
      <label>Titre du Lab *</label>
      <input type="text" id="f-title" placeholder="Ex: Configuration VLAN avec STP">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Ce que couvre ce lab..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select id="f-type">
          <option value="video">📹 Vidéo seule</option>
          <option value="packet">🗂️ Packet Tracer seul</option>
          <option value="both">⚡ Vidéo + Packet Tracer</option>
        </select>
      </div>
      <div class="form-group">
        <label>Durée vidéo</label>
        <input type="text" id="f-duration" placeholder="Ex: 12:34">
      </div>
    </div>

    <div class="form-group">
      <label>Lien vidéo (YouTube / local)</label>
      <input type="text" id="f-video" placeholder="https://youtube.com/watch?v=...">
    </div>

    <div class="form-group">
      <label>Lien fichier Packet Tracer (.pkt)</label>
      <input type="text" id="f-pkt" placeholder="labs/mon-fichier.pkt ou lien GitHub">
    </div>

    <div class="form-group">
      <label>URL Thumbnail (image de couverture)</label>
      <input type="text" id="f-thumb" placeholder="images/vlan.png ou URL externe">
    </div>

    <div class="form-group">
      <label>Tags (séparés par des virgules)</label>
      <input type="text" id="f-tags" placeholder="VLAN, STP, Trunk, Switching">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveCard()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ─── DONNÉES EXEMPLES ───
let labs = [
  {
    id: 1,
    title: "Modèle OSI — Comprendre les 7 couches",
    desc: "Explication complète du modèle OSI, de la couche physique à la couche application. Démonstration en Packet Tracer.",
    type: "both",
    videoUrl: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
    pktUrl: "labs/modele-osi.pkt",
    thumb: "",
    thumbEmoji: "📡",
    thumbBg: "linear-gradient(135deg,#0a1628,#1a3a5c)",
    duration: "18:42",
    tags: ["OSI", "Modèles", "Couches"]
  },
  {
    id: 2,
    title: "VLAN & Trunk — Configuration Cisco",
    desc: "Création de VLANs, liaison trunk entre switches, commandes show vlan brief.",
    type: "both",
    videoUrl: "",
    pktUrl: "labs/vlan-trunk.pkt",
    thumb: "",
    thumbEmoji: "🔀",
    thumbBg: "linear-gradient(135deg,#0d1f0d,#1a4a1a)",
    duration: "22:10",
    tags: ["VLAN", "Trunk", "Switching", "802.1Q"]
  },
  {
    id: 3,
    title: "OSPF Multi-Area — Lab avancé",
    desc: "Configuration OSPF sur plusieurs zones, ABR, redistribution de routes.",
    type: "packet",
    videoUrl: "",
    pktUrl: "labs/ospf-multiarea.pkt",
    thumb: "",
    thumbEmoji: "🗺️",
    thumbBg: "linear-gradient(135deg,#1a0d28,#3a1a5c)",
    duration: "",
    tags: ["OSPF", "Routage", "Dynamic", "Area"]
  },
  {
    id: 4,
    title: "NAT & PAT — Translation d'adresses",
    desc: "NAT statique, dynamique et PAT. Accès internet depuis un réseau privé.",
    type: "video",
    videoUrl: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
    pktUrl: "",
    thumb: "",
    thumbEmoji: "🔄",
    thumbBg: "linear-gradient(135deg,#1a1000,#4a2e00)",
    duration: "15:08",
    tags: ["NAT", "PAT", "IPv4", "WAN"]
  },
  {
    id: 5,
    title: "STP — Spanning Tree Protocol",
    desc: "Prévention des boucles réseau, élection du root bridge, états des ports.",
    type: "both",
    videoUrl: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
    pktUrl: "labs/stp.pkt",
    thumb: "",
    thumbEmoji: "🌲",
    thumbBg: "linear-gradient(135deg,#001a10,#00401a)",
    duration: "19:55",
    tags: ["STP", "Switching", "Boucles", "RSTP"]
  },
  {
    id: 6,
    title: "ACL Standard & Étendue",
    desc: "Filtrage du trafic avec les Access Control Lists, wildcards, placement des règles.",
    type: "packet",
    videoUrl: "",
    pktUrl: "labs/acl.pkt",
    thumb: "",
    thumbEmoji: "🛡️",
    thumbBg: "linear-gradient(135deg,#1a0808,#4a0000)",
    duration: "",
    tags: ["ACL", "Sécurité", "Filtrage", "IPv4"]
  }
];

let activeFilter = 'all';
let searchQuery = '';

// ─── RENDER ───
function render() {
  const grid = document.getElementById('grid');
  const q = searchQuery.toLowerCase().trim();

  const filtered = labs.filter(lab => {
    const matchFilter = activeFilter === 'all' || lab.type === activeFilter;
    const matchSearch = !q || 
      lab.title.toLowerCase().includes(q) ||
      lab.desc.toLowerCase().includes(q) ||
      lab.tags.some(t => t.toLowerCase().includes(q));
    return matchFilter && matchSearch;
  });

  // Stats
  document.getElementById('totalCount').textContent = labs.length;
  document.getElementById('videoCount').textContent = labs.filter(l => l.type === 'video' || l.type === 'both').length;
  document.getElementById('pktCount').textContent = labs.filter(l => l.type === 'packet' || l.type === 'both').length;
  document.getElementById('resultCount').textContent = 
    filtered.length !== labs.length ? `${filtered.length} résultat${filtered.length > 1 ? 's' : ''}` : '';

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <div class="icon">🔍</div>
        <h3>Aucun résultat pour "${q || activeFilter}"</h3>
        <p>Essaie un autre mot-clé ou ajoute un nouveau lab !</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(lab => {
    const badgeLabel = { video: '▶ Vidéo', packet: '🗂 Packet Tracer', both: '⚡ Vidéo + PKT' }[lab.type];
    const tags = lab.tags.map(t => `<span class="tag">${t}</span>`).join('');

    const thumb = lab.thumb
      ? `<img src="${lab.thumb}" alt="${lab.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';

    const placeholder = `<div class="thumb-placeholder" style="background:${lab.thumbBg || '#151820'}">${lab.thumbEmoji || '📁'}</div>`;

    const videoBtn = (lab.type === 'video' || lab.type === 'both') && lab.videoUrl
      ? `<a class="action-btn primary" href="${lab.videoUrl}" target="_blank" rel="noopener">
           <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Voir la vidéo
         </a>` : '';

    const pktBtn = (lab.type === 'packet' || lab.type === 'both') && lab.pktUrl
      ? `<a class="action-btn" href="${lab.pktUrl}" download>
           <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> .pkt
         </a>` : '';

    return `
      <div class="card">
        <div class="thumb">
          ${thumb}
          ${placeholder}
          <span class="type-badge ${lab.type}">${badgeLabel}</span>
          ${lab.duration ? `<span class="duration">${lab.duration}</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${lab.title}</div>
          <div class="card-desc">${lab.desc}</div>
          <div class="card-tags">${tags}</div>
          ${videoBtn || pktBtn ? `<div class="card-actions">${videoBtn}${pktBtn}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ─── FILTER ───
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ─── SEARCH ───
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ─── MODAL ───
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  ['f-title','f-desc','f-video','f-pkt','f-thumb','f-tags','f-duration'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-type').value = 'video';
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveCard() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Le titre est obligatoire !'); return; }

  const tagsRaw = document.getElementById('f-tags').value;
  const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

  labs.unshift({
    id: Date.now(),
    title,
    desc: document.getElementById('f-desc').value.trim(),
    type: document.getElementById('f-type').value,
    videoUrl: document.getElementById('f-video').value.trim(),
    pktUrl: document.getElementById('f-pkt').value.trim(),
    thumb: document.getElementById('f-thumb').value.trim(),
    thumbEmoji: '📂',
    thumbBg: 'linear-gradient(135deg,#151820,#1c2030)',
    duration: document.getElementById('f-duration').value.trim(),
    tags
  });

  closeModal();
  render();
}

// ─── INIT ───
render();
</script>
</body>
</html>
